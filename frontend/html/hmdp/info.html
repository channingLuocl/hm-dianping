<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>黑马点评 - 个人主页</title>
  <!-- 引入样式 -->
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <link href="./css/info.css">
  <!-- 引入图标库 -->
  <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

  <style type="text/css">
    :root {
      --primary-color: #4361ee;
      --secondary-color: #3f37c9;
      --accent-color: #4895ef;
      --text-primary: #1a1a1a;
      --text-secondary: #6c757d;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      --radius: 16px;
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Microsoft YaHei', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      line-height: 1.6;
    }

    #app {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 0px 80px;
      background-color: var(--bg-color);
      min-height: 100vh;
    }

    /* 头部样式 */
    .header {
      display: flex;
      align-items: center;
      padding: 16px 0;
      position: sticky;
      top: 0;
      background-color: var(--bg-color);
      z-index: 100;
      margin-bottom: 8px;
    }

    .header-back-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card-bg);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: var(--transition);
      margin-left: 16px;
    }

    .header-back-btn:hover {
      transform: translateX(-2px);
      background: var(--primary-color);
      color: white;
    }

    .header-title {
      flex: 1;
      text-align: center;
      font-weight: 600;
      font-size: 18px;
      color: var(--text-primary);
      margin-left: -16px;
    }

    /* 基本信息区域 */
    .basic {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      position: relative;
    }

    .basic-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      margin-right: 16px;
      border: 3px solid #f0f0f0;
      pointer-events: none;
      /* 禁止点击事件 */
      cursor: default;
      /* 鼠标指针变为默认 */
    }

    /* .basic-icon:hover {
      transform: scale(1.05);
      border-color: var(--primary-color);
    } */

    .basic-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .basic-info {
      flex: 1;
    }

    .basic-info .name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-primary);
    }

    .basic-info span {
      font-size: 14px;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 12px;
    }

    .edit-btn {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(67, 97, 238, 0.1);
      color: var(--primary-color);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .edit-btn:hover {
      background: var(--primary-color);
      color: white;
      transform: translateY(-2px);
    }

    .logout-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: var(--transition);
      padding: 4px 8px;
      border-radius: 12px;
    }

    .logout-btn:hover {
      color: #e74c3c;
      background: rgba(231, 76, 60, 0.1);
    }

    /* 个人简介 */
    .introduce {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 16px 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      color: var(--text-secondary);
      font-size: 14px;
      transition: var(--transition);
      cursor: pointer;
    }

    .introduce:hover {
      background: rgba(67, 97, 238, 0.05);
    }

    /* 内容区域 */
    .content {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      min-height: 400px;
    }

    .el-tabs {
      height: 100%;
    }

    .el-tabs__header {
      margin: 0;
      padding: 0 16px;
      background: var(--card-bg);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05) !important;
      /* 优化底部边框 */
    }

    .el-tabs__nav-wrap::after {
      display: none;
    }

    .el-tabs__active-bar {
      background-color: var(--primary-color);
      height: 3px;
      border-radius: 2px;
    }

    .el-tabs__item {
      font-weight: 500;
      color: var(--text-secondary);
      padding: 12px 16px;
      transition: var(--transition);
    }

    .el-tabs__item.is-active {
      color: var(--primary-color);
      font-weight: 600;
    }

    .el-tabs__item:hover {
      color: var(--primary-color);
    }

    .el-tabs__content {
      padding: 16px;
      height: calc(100% - 50px);
      overflow-y: auto;
    }

    /* 笔记项样式 */
    .blog-item {
      display: flex;
      background: var(--bg-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      transition: var(--transition);
      cursor: pointer;
      border: none !important;
      /* 确保没有边框 */
    }

    .blog-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
    }

    .blog-img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      margin-right: 16px;
    }

    .blog-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }

    .blog-item:hover .blog-img img {
      transform: scale(1.1);
    }

    .blog-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .blog-title {
      font-weight: 500;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .blog-stats {
      display: flex;
    }

    .blog-liked,
    .blog-comments {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      color: var(--text-secondary);
      margin-right: 16px;
    }

    .blog-liked img,
    .blog-comments i {
      margin-right: 4px;
      width: 14px;
      height: 14px;
    }

    /* 关注页样式 */
    .blog-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      max-height: 500px;
      overflow-y: auto;
      padding: 8px;
    }

    .blog-box {
      background: var(--bg-color);
      border-radius: 12px;
      overflow: hidden;
      transition: var(--transition);
      cursor: pointer;
      border: none !important;
      /* 确保没有边框 */
    }

    .blog-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
    }

    .blog-img2 {
      width: 100%;
      height: 120px;
      overflow: hidden;
    }

    .blog-img2 img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }

    .blog-box:hover .blog-img2 img {
      transform: scale(1.1);
    }

    .blog-box .blog-title {
      padding: 12px;
      font-size: 14px;
      font-weight: 500;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      height: 48px;
    }

    .blog-foot {
      display: flex;
      align-items: center;
      padding: 0 12px 12px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .blog-user-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      overflow: hidden;
      margin-right: 6px;
    }

    .blog-user-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .blog-user-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 8px;
    }

    .blog-liked {
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: var(--transition);
    }

    .blog-liked:hover {
      color: var(--primary-color);
    }

    .blog-liked svg {
      margin-right: 4px;
      transition: var(--transition);
    }

    .blog-liked:hover svg {
      transform: scale(1.2);
    }

    /* 空状态样式 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      text-align: center;
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* 响应式设计 */
    @media (max-width: 480px) {
      .blog-list {
        grid-template-columns: 1fr;
      }

      .basic {
        flex-direction: column;
        text-align: center;
        padding: 20px;
      }

      .basic-icon {
        margin-right: 0;
        margin-bottom: 12px;
      }

      .logout-btn {
        position: relative;
        top: 0;
        right: 0;
        margin-top: 12px;
        align-self: flex-end;
      }
    }

    /* 动画效果 */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .blog-item,
    .blog-box {
      animation: fadeIn 0.5s ease forwards;
    }

    /* 滚动条样式 */
    .el-tabs__content::-webkit-scrollbar,
    .blog-list::-webkit-scrollbar {
      width: 4px;
    }

    .el-tabs__content::-webkit-scrollbar-track,
    .blog-list::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .el-tabs__content::-webkit-scrollbar-thumb,
    .blog-list::-webkit-scrollbar-thumb {
      background: var(--primary-color);
      border-radius: 10px;
    }

    /* 底部栏样式优化 - 解决框线问题 */
    foot-bar {
      border: none !important;
      box-shadow: none !important;
      outline: none !important;
    }

    /* 适配iPhone X等设备的底部安全区域 */
    @media only screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) {
      #app {
        padding-bottom: calc(80px + env(safe-area-inset-bottom)) !important;
      }
    }

    /* 通用安全区域适配 */
    #app {
      padding-bottom: calc(80px + constant(safe-area-inset-bottom)) !important;
      padding-bottom: calc(80px + env(safe-area-inset-bottom)) !important;
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="header">
      <div class="header-back-btn" @click="goBack">
        <i class="el-icon-arrow-left"></i>
      </div>
      <div class="header-title">个人主页</div>
    </div>

    <div class="basic">
      <div class="basic-icon">
        <img :src="user.icon || '/imgs/icons/default-icon.png'" alt="用户头像">
      </div>
      <div class="basic-info">
        <div class="name">{{user.nickName}}</div>
        <span><i class='bx bx-map'></i> 杭州</span>
        <div class="edit-btn" @click="toEdit">
          <i class='bx bx-edit-alt'></i> 编辑资料
        </div>
      </div>
      <div class="logout-btn" @click="logout">
        <i class='bx bx-log-out'></i> 退出登录
      </div>
    </div>

    <div class="introduce" @click="toEdit">
      <span v-if="info.introduce">{{info.introduce}}</span>
      <span v-else>添加个人简介，让大家更好的认识你 <i class="el-icon-edit"></i></span>
    </div>

    <div class="content">
      <el-tabs v-model="activeName" @tab-click="handleClick">
        <el-tab-pane label="笔记" name="1">
          <div v-for="b in blogs" :key="b.id" class="blog-item" @click="toNoteDetail(b.id)">
            <div class="blog-img"><img :src="b.images.split(',')[0]" alt="笔记图片"></div>
            <div class="blog-info">
              <div class="blog-title">{{b.title}}</div>
              <div class="blog-stats">
                <div class="blog-liked"><img src="/imgs/thumbup.png" alt="点赞"> {{b.liked}}</div>
                <div class="blog-comments"><i class="el-icon-chat-dot-round"></i> {{b.comments}}</div>
              </div>
            </div>
          </div>
          <div v-if="blogs.length === 0" class="empty-state">
            <i class='bx bx-news'></i>
            <p>暂无笔记</p>
          </div>
        </el-tab-pane>

        <el-tab-pane label="评价" name="2">
          <div class="empty-state">
            <i class='bx bx-comment-detail'></i>
            <p>暂无评价</p>
          </div>
        </el-tab-pane>

        <el-tab-pane :label="'粉丝(' + (fansCount || 0) + ')'" name="3">
          <div class="empty-state">
            <i class='bx bx-user-circle'></i>
            <p>暂无粉丝</p>
          </div>
        </el-tab-pane>

        <el-tab-pane :label="'关注(' + (followCount || 0) + ')'" name="4">
          <div class="blog-list" @scroll="onScroll">
            <div class="blog-box" v-for="b in blogs2" :key="b.id">
              <div class="blog-img2" @click="toBlogDetail(b)"><img :src="b.img" alt="博客图片"></div>
              <div class="blog-title">{{b.title}}</div>
              <div class="blog-foot">
                <div class="blog-user-icon"><img :src="b.icon || '/imgs/icons/default-icon.png'" alt="用户头像"></div>
                <div class="blog-user-name">{{b.name}}</div>
                <div class="blog-liked" @click="addLike(b)">
                  <svg t="1646634642977" class="icon" viewBox="0 0 1024 1024" version="1.1"
                    xmlns="http://www.w3.org/2000/svg" p-id="2187" width="14" height="14">
                    <path
                      d="M160 944c0 8.8-7.2 16-16 16h-32c-26.5 0-48-21.5-48-48V528c0-26.5 21.5-48 48-48h32c8.8 0 16 7.2 16 16v448zM96 416c-53 0-96 43-96 96v416c0 53 43 96 96 96h96c17.7 0 32-14.3 32-32V448c0-17.7-14.3-32-32-32H96zM505.6 64c16.2 0 26.4 8.7 31 13.9 4.6 5.2 12.1 16.3 10.3 32.4l-23.5 203.4c-4.9 42.2 8.6 84.6 36.8 116.4 28.3 31.7 68.9 49.9 111.4 49.9h271.2c6.6 0 10.8 3.3 13.2 6.1s5 7.5 4 14l-48 303.4c-6.9 43.6-29.1 83.4-62.7 112C815.8 944.2 773 960 728.9 960h-317c-33.1 0-59.9-26.8-59.9-59.9v-455c0-6.1 1.7-12 5-17.1 69.5-109 106.4-234.2 107-364h41.6z m0-64h-44.9C427.2 0 400 27.2 400 60.7c0 127.1-39.1 251.2-112 355.3v484.1c0 68.4 55.5 123.9 123.9 123.9h317c122.7 0 227.2-89.3 246.3-210.5l47.9-303.4c7.8-49.4-30.4-94.1-80.4-94.1H671.6c-50.9 0-90.5-44.4-84.6-95l23.5-203.4C617.7 55 568.7 0 505.6 0z"
                      p-id="2188" :fill="b.isLike ? '#ff6633' : '#82848a'"></path>
                  </svg>
                  {{b.liked}}
                </div>
              </div>
            </div>
          </div>
          <div v-if="blogs2.length === 0" class="empty-state">
            <i class='bx bx-user-plus'></i>
            <p>暂无关注</p>
          </div>
        </el-tab-pane>
      </el-tabs>
    </div>

    <foot-bar :active-btn="4"></foot-bar>
  </div>

  <script src="./js/vue.js"></script>
  <script src="./js/axios.min.js"></script>
  <!-- 引入组件库 -->
  <script src="./js/element.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/footer.js"></script>

  <script>
    const app = new Vue({
      el: "#app",
      data: {
        user: "",
        activeName: "1",
        info: {},
        blogs: [],
        blogs2: [], // 关注的人的播客
        fansCount: 0,
        followCount: 0,
        params: {
          minTime: 0, // 上一次拉取到的时间戳
          offset: 0, // 偏移量
        },
        count: 5,
        isReachBottom: false,
      },
      created() {
        this.queryUser();
      },
      methods: {
        toNoteDetail(noteId) {
          // 直接跳转到新的HTML页面，并通过URL传递参数
          window.location.href = `blog-detail.html?id=${noteId}`;
        },
        load() {
          this.count += 2;
        },
        queryBlogs() {
          axios.get("/blog/of/me")
            .then(({ data }) => this.blogs = data)
            .catch(this.$message.error)
        },
        queryBlogsOfFollow(clear) {
          if (clear) {
            this.params.offset = 0;
            this.params.minTime = new Date().getTime() + 1;
          }
          let { minTime, offset: os } = this.params;
          axios.get("/blog/of/follow", {
            params: { offset: os, lastId: minTime || new Date().getTime() + 1 }
          })
            .then(({ data }) => {
              if (!data) {
                return;
              }
              let { list, ...params } = data;
              list.forEach(b => b.img = b.images.split(",")[0])
              this.blogs2 = clear ? list : this.blogs2.concat(list);
              this.params = params;
            })
            .catch(e => console.log(e))
        },
        queryUser() {
          // 查询用户信息
          axios.get("/user/me")
            .then(({ data }) => {
              // 保存用户
              this.user = data;
              // 查询用户详情
              this.queryUserInfo();
              // 查询用户笔记
              this.queryBlogs();
              // 查询粉丝和关注数量
              this.queryFollowStats();
            })
            .catch(err => {
              location.href = "login.html"
            })
        },
        goBack() {
          history.back();
        },
        queryUserInfo() {
          axios.get("/user/info/" + this.user.id)
            .then(({ data }) => {
              if (!data) {
                return
              }
              // 保存用户详情
              this.info = data;
              // 保存到本地
              sessionStorage.setItem("userInfo", JSON.stringify(data))
            })
            .catch(err => {
              this.$message.error(err);
            })
        },
        queryFollowStats() {
          // 这里应该调用API获取粉丝和关注数量
          // 暂时使用模拟数据
          this.fansCount = 0;
          this.followCount = 0;
        },
        toEdit() {
          location.href = 'info-edit.html'
        },
        logout() {
          axios.post("/user/logout")
            .then(() => {
              // 清理session
              sessionStorage.removeItem("token")
              // 跳转
              location.href = "/"
            })
            .catch(this.$message.error)
        },
        handleClick(r) {
          if (r.name === '4') {
            this.queryBlogsOfFollow(true);
          }
        },
        addLike(b) {
          axios.put("/blog/like/" + b.id)
            .then(({ data }) => {
              this.queryBlogById(b);
            })
            .catch(err => {
              this.$message.error(err)
            })
        },
        queryBlogById(b) {
          axios.get("/blog/" + b.id)
            .then(({ data }) => {
              b.liked = data.liked;
              b.isLike = data.isLike;
            })
            .catch(() => {
              this.$message.error
              b.liked++;
            })
        },
        onScroll(e) {
          let scrollTop = e.target.scrollTop;
          let offsetHeight = e.target.offsetHeight;
          let scrollHeight = e.target.scrollHeight;
          if (scrollTop === 0) {
            // 到顶部了，查询一次
            this.queryBlogsOfFollow(true);
          } else if (scrollTop + offsetHeight + 1 > scrollHeight && !this.isReachBottom) {
            this.isReachBottom = true
            // 再次查询下一页数据
            this.queryBlogsOfFollow();
          } else {
            this.isReachBottom = false
          }
        },
        toBlogDetail(b) {
          // 跳转到博客详情页
          window.open(`blog-detail.html?id=${b.id}`, '_blank');
        }
      }
    })
  </script>
</body>

</html>
